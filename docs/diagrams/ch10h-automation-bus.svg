<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#39ff14"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .sm    { fill:#e0f0ff; font-size:10.5px; }
      .dim   { fill:#7a8ba8; font-size:10.5px; }
      .code  { fill:#ffd166; font-size:10.5px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .green { fill:#39ff14; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .title { fill:#e0f0ff; font-size:17px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .srcbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .hostbx{ fill:#0d0d1a; stroke:#ff6b9d; stroke-width:1.5; }
      .swbx  { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.8; }
      .apibx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#2a2a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .gdash { stroke:#39ff14; stroke-width:1.4; fill:none; marker-end:url(#ahg); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="700" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="696" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="500" y="34" text-anchor="middle" class="title">BROWSER AUTOMATION BUS</text>
  <text x="500" y="54" text-anchor="middle" class="dim">stryke &#8594; zwire-host &#8594; HUD service worker &#8594; Chrome &#183; 161-verb surface, 99 browser.* verbs, one executor</text>

  <!-- ── row 1: trigger sources ── -->
  <text x="30" y="84" class="h">1 · TRIGGERS</text>
  <g>
    <rect class="srcbx" x="30"  y="94" width="220" height="66" rx="3"/>
    <text x="42" y="114" class="cyan sm" font-weight="700">External stryke (terminal)</text>
    <text x="42" y="132" class="code">App::open("zwire")</text>
    <text x="42" y="148" class="code">  -&gt;call("browser.snapRight")</text>

    <rect class="srcbx" x="266" y="94" width="220" height="66" rx="3"/>
    <text x="278" y="114" class="cyan sm" font-weight="700">Page palette &#8984;K</text>
    <text x="278" y="132" class="dim">any web page &#183; content script</text>
    <text x="278" y="148" class="dim">stryke step in a command</text>

    <rect class="srcbx" x="514" y="94" width="220" height="66" rx="3"/>
    <text x="526" y="114" class="cyan sm" font-weight="700">New-tab palette</text>
    <text x="526" y="132" class="dim">chrome://newtab &#183; separate ext</text>
    <text x="526" y="148" class="dim">bridged cross-extension</text>

    <rect class="srcbx" x="750" y="94" width="220" height="66" rx="3"/>
    <text x="762" y="114" class="cyan sm" font-weight="700">HUD page</text>
    <text x="762" y="132" class="dim">chrome-extension:// pages</text>
    <text x="762" y="148" class="dim">persistent document</text>
  </g>

  <!-- ── row 2: zwire-host ── -->
  <text x="30" y="204" class="h" fill="#ff6b9d">2 · zwire-host <tspan class="dim">(native, Rust)</tspan></text>
  <rect class="hostbx" x="30" y="214" width="940" height="96" rx="3"/>
  <rect class="chip" x="46" y="230" width="290" height="66" rx="2"/>
  <text x="58" y="250" class="pink sm" fill="#ff6b9d" font-weight="700">zbus socket</text>
  <text x="58" y="266" class="code">$TMPDIR/zgui/zwire.sock</text>
  <text x="58" y="284" class="dim">App::open entry &#183; advertises</text>
  <text x="58" y="298" class="dim">the 161-verb discovery surface</text>

  <rect class="chip" x="356" y="230" width="270" height="66" rx="2"/>
  <text x="368" y="250" class="pink sm" fill="#ff6b9d" font-weight="700">stryke_run</text>
  <text x="368" y="266" class="dim">runs the stryke subprocess</text>
  <text x="368" y="284" class="dim">(bundled sidecar, 10s cap);</text>
  <text x="368" y="298" class="dim">reply carries stdout + zbAction</text>

  <rect class="chip" x="646" y="230" width="308" height="66" rx="2"/>
  <text x="658" y="250" class="pink sm" fill="#ff6b9d" font-weight="700">browser.* &#8594; __zbus_action</text>
  <text x="658" y="266" class="dim">strip "browser." prefix, stamp a</text>
  <text x="658" y="284" class="dim">monotonic nonce, write to the</text>
  <text x="658" y="298" class="dim">file-backed KV (any verb accepted)</text>

  <!-- ── row 3: service worker ── -->
  <text x="30" y="354" class="h">3 · hud-internal service worker <tspan class="dim">(MV3)</tspan></text>
  <rect class="swbx" x="30" y="364" width="940" height="104" rx="3"/>
  <rect class="chip" x="46" y="380" width="300" height="74" rx="2"/>
  <text x="58" y="400" class="cyan sm" font-weight="700">persistent native port</text>
  <text x="58" y="416" class="dim">the sysinfo stream keeps the</text>
  <text x="58" y="432" class="dim">worker alive AND carries stryke_run</text>
  <text x="58" y="448" class="dim">+ the id-correlated zbAction reply</text>

  <rect class="chip" x="360" y="380" width="286" height="74" rx="2"/>
  <text x="372" y="400" class="cyan sm" font-weight="700">relayHost / relayStrykeRun</text>
  <text x="372" y="416" class="dim">page content scripts (onMessage)</text>
  <text x="372" y="432" class="dim">+ new-tab palette (onMessage-</text>
  <text x="372" y="448" class="dim">External) share one relay</text>

  <rect class="chip" x="660" y="380" width="294" height="74" rx="2"/>
  <text x="672" y="400" class="green sm" font-weight="700">execZbCmd — the executor</text>
  <text x="672" y="416" class="dim">the single sink for every path;</text>
  <text x="672" y="432" class="dim">reads __zbus_action / reply.zbAction</text>
  <text x="672" y="448" class="dim">and runs the Chrome API call</text>

  <!-- ── row 4: chrome apis ── -->
  <text x="30" y="512" class="h" fill="#39ff14">4 · CHROME APIs <tspan class="dim">— 99 browser.* verbs, full worker permissions</tspan></text>
  <rect class="apibx" x="30" y="522" width="940" height="150" rx="3"/>
  <g>
    <rect class="chip" x="46"  y="538" width="216" height="40" rx="2"/><text x="54" y="556" class="green sm" font-weight="700">tabs &#183; nav &#183; zoom</text><text x="54" y="572" class="dim">open/close/move/pin/mute/reload/goBack</text>
    <rect class="chip" x="272" y="538" width="216" height="40" rx="2"/><text x="280" y="556" class="green sm" font-weight="700">windows &#183; tiling</text><text x="280" y="572" class="dim">snapLeft/Right/quadrants (system.display)</text>
    <rect class="chip" x="498" y="538" width="216" height="40" rx="2"/><text x="506" y="556" class="green sm" font-weight="700">tab groups</text><text x="506" y="572" class="dim">group/ungroup/collapse/expand (tabGroups)</text>
    <rect class="chip" x="724" y="538" width="230" height="40" rx="2"/><text x="732" y="556" class="green sm" font-weight="700">downloads</text><text x="732" y="572" class="dim">download/pause/resume/cancel/retry</text>

    <rect class="chip" x="46"  y="586" width="216" height="40" rx="2"/><text x="54" y="604" class="green sm" font-weight="700">browsingData</text><text x="54" y="620" class="dim">clearCache/Cookies/Passwords/AllData</text>
    <rect class="chip" x="272" y="586" width="216" height="40" rx="2"/><text x="280" y="604" class="green sm" font-weight="700">reading list &#183; power</text><text x="280" y="620" class="dim">add/remove &#183; keepAwake/keepDisplayAwake</text>
    <rect class="chip" x="498" y="586" width="216" height="40" rx="2"/><text x="506" y="604" class="green sm" font-weight="700">management</text><text x="506" y="620" class="dim">enable/disable/uninstall/launchApp</text>
    <rect class="chip" x="724" y="586" width="230" height="40" rx="2"/><text x="732" y="604" class="green sm" font-weight="700">history &#183; bookmarks &#183; notify</text><text x="732" y="620" class="dim">clear/delete &#183; bookmarkTab &#183; notify</text>

    <rect class="chip" x="46"  y="634" width="908" height="26" rx="2"/><text x="54" y="651" class="dim">screenshot (captureVisibleTab &#8594; download) &#183; detectLanguage &#183; sortTabs &#183; muteAll/pinAll &#183; centerWindow &#183; moveWindowNextDisplay &#183; &#8230;</text>
  </g>

  <!-- ── flow arrows ── -->
  <!-- external stryke -> zbus socket -->
  <path class="arrow" d="M140 160 L165 214"/>
  <!-- page palette -> relay (persistent port), routed to SW row -->
  <path class="arrow" d="M376 160 L376 214"/>
  <!-- newtab -> relay (cross-ext) -->
  <path class="dash" d="M624 160 L520 214"/>
  <!-- HUD page -> stryke_run direct -->
  <path class="dash" d="M860 160 L640 214"/>

  <!-- host stryke_run -> SW persistent port (reply w/ zbAction) -->
  <path class="arrow" d="M491 310 L300 380"/>
  <!-- host __zbus_action KV -> execZbCmd reads it -->
  <path class="arrow" d="M800 310 L800 380"/>
  <!-- zbus socket -> stryke subprocess (same host, App::call) -->
  <path class="dash" d="M191 296 L191 310 L360 320" />

  <!-- execZbCmd -> Chrome APIs -->
  <path class="gdash" d="M807 454 L500 522"/>
  <path class="gdash" d="M760 454 L760 522"/>

  <!-- legend -->
  <text x="30" y="690" class="dim">
    <tspan class="cyan">&#8212;&#8594;</tspan> primary path &#160;&#160;
    <tspan fill="#7a8ba8">&#183;&#183;&#8594;</tspan> alt trigger / same-process &#160;&#160;
    <tspan class="green">&#8212;&#8594;</tspan> API dispatch &#160;&#160; the persistent port lets the MV3 worker survive the native round-trip a one-shot loses.
  </text>
</svg>
