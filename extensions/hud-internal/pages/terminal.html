<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zwire · Terminal</title>
<link rel="stylesheet" href="../lib/term/xterm.css">
<link rel="stylesheet" href="../lib/term/terminal.css">
<style>
  html, body { margin: 0; height: 100vh; overflow: hidden; background: #0a0a12; }
  /* fill the whole tab instead of the floating corner pane */
  #terminalPane.terminal-pane {
    position: fixed !important; inset: 0 !important; left: 0 !important; top: 0 !important;
    right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important;
    border-radius: 0 !important; transform: none !important; box-shadow: none !important;
  }
</style>
</head>
<body>
<!-- real zgui-core so terminal.js takes the ZGui.toolbar/buttonBar path (not the legacy fallback) -->
<script src="../lib/zgui-core/webui/util.js"></script>
<script src="../lib/zgui-core/webui/toolbar.js"></script>
<script src="../lib/zgui-core/webui/button-bar.js"></script>
<script src="../lib/term/xterm.js"></script>
<script src="../lib/term/terminal.js"></script>
<!-- boot is an external same-origin script: the extension CSP (`script-src 'self'`) blocks inline JS -->
<script src="terminal-boot.js"></script>
</body>
</html>
